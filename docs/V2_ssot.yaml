ssot:
  id: fishit-mapper-v2
  version: 1
  status: draft-binding
  owner: Chris
  date: 2026-03-27
  purpose: >-
    Define the exact target architecture, scope, use cases, capability model,
    module layout, donor repositories, copy-in modules, tooling, persistence,
    logging, and phased implementation plan for the new FishIT-Mapper parallel repo.
    This repo is a browser-near mapping and pipeline-lab application whose output is
    deterministic site/pipeline profiles that can later be imported into FishIT-Player.

product:
  name: FishIT-Mapper
  role: parallel_repo_pipeline_lab
  mission: >-
    Turn websites and media portals into analyzable, replayable, and sometimes adapter-ready
    sources by combining embedded browser behavior, session/state capture, request inspection,
    replay validation, and rule/profile export.
  non_goals:
    - Do not attempt to become a universal full browser.
    - Do not attempt to guarantee native Kotlin adapters for all websites.
    - Do not import every external catalog into the FishIT-Player main catalog by default.
    - Do not place heavy reverse-engineering logic directly into FishIT-Player.
    - Do not start with a headless-only HTTP client approach.

core_principles:
  - browser_near_first
  - deterministic_profile_export
  - session_reuse_over_relogin
  - external_catalog_separation
  - structured_machine_readable_logging
  - replay_before_runtime_adapter
  - minimal_functional_stack
  - explicit_capability_classification
  - phase_gated_complexity
  - secure_persistence_only_for_required_secrets

problem_statement:
  summary: >-
    FishIT-Player needs a future-safe way to add external websites and media portals as
    pipeline-like sources without prematurely hardcoding custom adapters. The system must
    observe how a portal behaves in a browser-like environment, detect the minimum stable
    endpoint and session set required for home feed, search, details, and playback, and then
    export deterministic profiles for later use in FishIT-Player.
  why_parallel_repo:
    - Keep reverse-engineering and browser tooling outside the main player app.
    - Allow faster iteration with custom UI and debugging workflows.
    - Enable Codex/ADB/live-log driven development without destabilizing FishIT-Player.
    - Produce only the minimal reusable code and profiles that are later imported.

capability_model:
  classes:
    WEB_ONLY:
      description: >-
        Website works mainly as embedded web experience. Native extraction is weak or unstable.
      suitable_for:
        - embedded_detail_or_playback
        - shallow_home_mirroring
        - minimal_search_bridge
      markers:
        - login_only_stable_in_webview
        - unstable_or_unclear_api_patterns
        - playback_requires_browser_context
    HYBRID:
      description: >-
        Home, search, and often details can be replayed or resolved natively, but some auth,
        refresh, or playback logic remains browser-near.
      suitable_for:
        - external_catalog_search_provider
        - home_feed_mirroring
        - native_search_plus_browser_near_playback
      markers:
        - stable_home_or_search_endpoints
        - reusable_session_state
        - playback_or_refresh_needs_browser_context
    NATIVE_READY:
      description: >-
        Core endpoints and session logic are stable enough for a true Kotlin provider adapter.
      suitable_for:
        - native_external_provider
        - parallel_internal_and_external_search
        - direct_playback_resolution
      markers:
        - stable_home_search_details_playback_endpoints
        - reproducible_headers_cookies_params
        - session_refresh_deterministic
    BLOCKED:
      description: >-
        Strong technical barriers prevent useful interception, replay, or native adaptation.
      suitable_for:
        - no_adapter
        - optional_thin_web_wrap_only
      markers:
        - suspected_or_confirmed_drm_barrier
        - certificate_pinning_or_equivalent_barrier
        - device_or_sdk_bound_tokens
        - strong_attestation_or_anti_bot_dependency
  default_target_class: HYBRID
  escalation_policy:
    - Start every site in WEB_ONLY or HYBRID investigation mode.
    - Promote to NATIVE_READY only after deterministic replay succeeds.
    - Mark BLOCKED early if interception and replay are fundamentally broken.

use_cases:
  primary:
    - id: uc_add_media_portal
      title: Add media portal as external source
      outcome: >-
        User can browse selected portal content through FishIT-Player-backed integration
        without merging the full external catalog into the internal main catalog.
    - id: uc_home_feed_catalogization
      title: Catalogize portal home feed
      outcome: >-
        Start page or selected rails from an external site are parsed, normalized into
        a lightweight UI model, and mirrored into the UI.
    - id: uc_global_search_bridge
      title: Search internal and external sources together
      outcome: >-
        Global search returns internal FishIT results and external provider results in a
        unified UI model.
    - id: uc_playback_resolution
      title: Resolve playback from external provider
      outcome: >-
        Search or home results from external sites are playable using provider-specific
        resolution logic.
    - id: uc_login_and_session_persistence
      title: Persist login/session state
      outcome: >-
        Cookies, local state, and other required session primitives are cached and restored
        to avoid repeated manual login.
    - id: uc_site_mapping_lab
      title: Map and inspect sites interactively
      outcome: >-
        Developer can use internal tooling, logs, click automation, and request inspection
        to identify endpoints, headers, tokens, and parsing rules.
    - id: uc_profile_export
      title: Export deterministic site profile
      outcome: >-
        Mapper outputs a stable machine-readable profile that FishIT-Player can later import.
  secondary:
    - id: uc_replay_validation
      title: Replay and validate extracted flows
    - id: uc_capability_auto_classification
      title: Auto-classify site into WEB_ONLY, HYBRID, NATIVE_READY, or BLOCKED
    - id: uc_rule_synthesis
      title: Generate extractor rules from observed traffic
    - id: uc_codex_live_debug
      title: Use Codex with live logcat and ADB-driven interaction for rapid iteration

functional_scope:
  included:
    - embedded_browser_session
    - request_response_inspection
    - cookie_capture_and_restore
    - local_storage_capture
    - indexeddb_relevance_detection
    - endpoint_candidate_detection
    - request_diffing
    - header_cookie_token_dependency_analysis
    - profile_export_import
    - replay_validation
    - lightweight_ui_mirroring
    - external_search_provider_support
    - structured_json_logging
    - python_assisted_analysis_via_chaquopy
  excluded_v1:
    - universal_code_generation_for_all_websites
    - full_general_purpose_browser_feature_parity
    - guaranteed_native_support_for_drm_bound_sites
    - generic_bypass_of_strong_platform_security_controls
    - full_internal_catalog_merging_of_all_external_sources

