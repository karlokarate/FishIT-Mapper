    implemented: true
    notes: primary production mission in current cut
  API_MAPPING:
    implemented: true
    notes: enabled in this slice with mission-aware finalization
  STANDALONE_APP:
    implemented: true
    notes: enabled in this slice with mission-aware finalization
  REPLAY_BUNDLE:
    implemented: true
    notes: enabled in this slice with mission-aware finalization

ui_flow:
  required_screens:
    - MissionLauncherScreen
    - MissionWizardSetupScreen
    - BrowserLabScreen
    - WizardStepPanel
    - ProbeChecklistPanel
    - ExportSummaryScreen
    - ExportHistoryScreen
    - FixtureReplayScreen
  MissionLauncherScreen:
    purpose: first_entrypoint
    requirements:
      - show_built_in_mission_cards
      - show_recent_exports
      - show_fixture_replay_entry
      - show_advanced_settings_entry
      - must_not_open_browser_automatically_without_mission_selection
  MissionWizardSetupScreen:
    purpose: wizard_bootstrap_and_target_configuration
    requirements:
      - show_selected_mission_summary
      - allow_safe_profile_overrides
      - require_target_url_input_before_browser_launch
      - show_wizard_step_preview_for_selected_mission
      - show_required_probes
      - show_expected_outputs
  BrowserLabScreen:
    purpose: main_capture_workspace
    requirements:
      - use_existing_einkbro_foundation
      - open_einkbro_with_selected_target_url
      - show_mission_context
      - show_capture_state
      - show_wizard_panel_with_current_step_instruction
      - show_overlay_anchor_controls
      - show_probe_controls
      - show_checklist_status
      - show_finish_run_action
      - show_export_when_ready
  WizardStepPanel:
    purpose: guided_manual_step_execution_and_saturation_feedback
    requirements:
      - show_current_step_instruction
      - show_current_step_required_evidence
      - show_step_saturation_state
      - allow_mark_step_retry_when_needs_more_evidence
      - allow_skip_optional_step_with_reason
      - show_blocking_reason_for_blocked_steps
  ProbeChecklistPanel:
    purpose: live_readiness_feedback
    requirements:
      - show_step_level_completion_not_only_global_probe_completion
      - show_completed_required_probes
      - show_missing_required_probes
      - show_recommendations
      - show_confidence_and_warnings_live_when_possible
  ExportSummaryScreen:
    purpose: pre_export_review
    requirements:
      - show_detected_capabilities
      - show_wizard_step_coverage
      - show_which_adapters_will_be_emitted
      - show_missing_or_degraded_sections
      - show_warnings_and_confidence
      - allow_export_confirmation
  ExportHistoryScreen:
    purpose: review_previous_exports
    requirements:
      - list_previous_bundles
      - show_mission_kind
      - show_export_targets
      - show_status
  FixtureReplayScreen:
    purpose: debug_and_regression
    requirements:
      - allow_loading_fixture_bundle
      - run_offline_replay
      - show_comparison_results

browser_lab_controls:
  required_actions:
    - mission_wizard_start
    - mission_wizard_next_step
    - mission_wizard_retry_step
    - mission_wizard_skip_optional_step
    - start_capture
    - pause_capture
    - finish_run
    - export_bundle
    - overlay_anchor_create
    - overlay_anchor_label
    - overlay_anchor_remove
    - home_probe_start
    - search_probe_start
    - detail_probe_start
    - playback_probe_start
    - auth_probe_start
    - probe_end
  rules:
    - browser_must_not_auto_open_before_target_url_input
    - controls_must_emit_machine_readable_semantic_events
    - probe_controls_must_be_mission_aware
    - wizard_controls_must_be_step_and_mission_aware
    - export_bundle_must_not_be_primary_shown_before_finish_run_or_readiness

event_requirements:
  mandatory_semantic_events:
    - mission_selected
    - mission_config_applied
    - wizard_started
    - wizard_step_started
    - wizard_step_saturation_updated
    - wizard_step_completed
    - wizard_step_blocked
    - wizard_finished
    - capture_started
    - capture_paused
    - capture_finished
    - overlay_anchor_created
    - overlay_anchor_labeled
    - overlay_anchor_removed
    - home_probe_start
    - search_probe_start
    - detail_probe_start
    - playback_probe_start
    - auth_probe_start
    - probe_end
    - export_requested
    - export_finalized
  semantics:
    - semantic_events_must_drive_phase_resolution
    - wizard_and_anchor_events_must_carry_mission_and_step_context
    - semantic_events_must_be_persisted_in_raw_event_store

site_runtime_model_generation:
  mandatory_rule: >-
    Every mission must generate site_runtime_model.json before any adapter is emitted.
  derivation_requirements:
    - core_model_must_be_noise_filtered
    - confidence_and_warning_models_must_be_populated
    - capability_model_must_reflect_selected_mission_and_observed_site
    - field_model_and_endpoint_model_must_be_present_even_if_partial
  partial_generation_rules:
    - partial_models_are_allowed_but_must_emit_warnings
    - missing_required_probes_must_lower_confidence_and_export_readiness

mission_specific_export_bundles:
  FISHIT_PIPELINE:
    required_files:
      - site_runtime_model.json
      - fishit_provider_draft.json
      - source_pipeline_bundle.json
      - manifest.json
      - exports/source_plugin_bundle.zip
      - endpoint_templates.json
      - field_matrix.json
      - auth_draft.json
      - playback_draft.json
      - confidence_report.json
      - warnings.json
  STANDALONE_APP:
    required_files:
      - site_runtime_model.json
      - webapp_runtime_draft.json
      - endpoint_templates.json
      - field_matrix.json
      - playback_draft.json
      - confidence_report.json
      - warnings.json
  API_MAPPING:
    required_files:
      - site_runtime_model.json
      - endpoint_templates.json
      - replay_bundle.json
      - confidence_report.json
      - warnings.json
      - runtime_events.jsonl
  REPLAY_BUNDLE:
    required_files:
      - site_runtime_model.json
      - replay_bundle.json
      - confidence_report.json
      - warnings.json
      - runtime_events.jsonl
      - response_index.json
      - fixture_manifest.json

advanced_settings:
  allowed_overrides:
    - include_raw_events
    - body_capture_debug_override
    - aggressive_replay_minimization
    - fixture_export_enable
    - confidence_threshold_override
  restrictions:
    - built_in_contract_fields_must_not_be_removed
    - site_runtime_model_generation_cannot_be_disabled
    - deterministic_serialization_cannot_be_disabled

quality_gates:
  must_pass:
    - mission_launcher_is_default_entrypoint
    - browser_does_not_open_without_mission_selection_except_restore_case
    - target_url_step_must_set_correlated_target_site_context
    - wizard_step_saturation_must_be_visible_and_machine_readable
    - semantic_probe_markers_are_emitted
    - site_runtime_model_is_generated_for_every_successful_run
    - only_mission_relevant_adapters_are_exported_by_default
    - export_summary_reflects_missing_required_probes
    - deterministic_serialization_is_preserved
  should_pass:
    - mission_checklist_improves_probe_completion_rate
    - export_bundle_size_is_reduced_vs_generic_dump_mode
    - users_can_recover_and_resume_incomplete_runs

implementation_notes:
  - Keep EinkBro as the browser foundation.
  - Keep wizard execution guided-manual; users perform actions inside browser while mapper validates evidence.
  - Add the mission layer above the browser, not instead of the browser.
  - Use the same collector core with policy-based behavior changes.
  - Keep mapper logic outside borrowed donor browser core whenever possible.
  - Keep FishIT-specific output as one derived adapter, not as the primary artifact.
  - Preserve replay/debug capability as first-class output.
  - Mission UX must help users perform the right probes for the chosen goal.
