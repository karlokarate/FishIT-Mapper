logging_contract:
  format: json_line
  requirements:
    - every_important_event_must_be_machine_readable
    - avoid_free_form_only_debug_strings_for_core_flows
    - all_user_marked_workflow_transitions_must_emit_explicit_semantic_events
  tags:
    - PIPELAB/AUTH
    - PIPELAB/WEBVIEW
    - PIPELAB/NET
    - PIPELAB/COOKIE
    - PIPELAB/STORAGE
    - PIPELAB/CLASSIFIER
    - PIPELAB/EXTRACTOR
    - PIPELAB/REPLAY
    - PIPELAB/PLAYER
    - PIPELAB/ERROR

endpoint_candidate_rules:
  home_candidate:
    signals:
      - called_after_home_or_landing
      - returns_json_or_structured_payload
      - contains_list_like_items
      - includes_title_or_name_plus_image_or_id_patterns
      - repeats_on_reload
  search_candidate:
    signals:
      - triggered_after_text_input
      - query_or_body_changes_with_search_text
      - returns_list_like_results
      - shape_compatible_with_catalog_items
  details_candidate:
    signals:
      - follows_tile_selection
      - returns_single_item_or_enriched_object
      - contains_more_fields_than_home
      - stable_resource_identifier_present
  playback_candidate:
    signals:
      - follows_play_action
      - contains_stream_url_or_license_or_source_payload
      - may_include_redirect_chain
      - often_depends_on_short_lived_tokens
  auth_or_refresh_candidate:
    signals:
      - appears_after_401_or_auth_boundary
      - changes_cookie_or_authorization_state
      - retry_after_refresh_succeeds

classification_logic:
  WEB_ONLY_when:
    - stable_endpoints_not_confident_enough
    - playback_requires_browser_context
    - session_restore_not_reliable_for_native_calls
  HYBRID_when:
    - stable_home_or_search_or_details_endpoints_exist
    - session_can_be_reused
    - playback_or_refresh_still_browser_near
  NATIVE_READY_when:
    - home_search_details_playback_all_stable
    - replay_succeeds_deterministically
    - session_refresh_is_deterministic
  BLOCKED_when:
    - strong_drm_or_pinning_or_native_sdk_dependency_detected
    - interception_or_replay_fails_for_fundamental_reasons

ui_screens:
  - name: MapperHomeActivity
    purpose: entry_and_site_session_overview
  - name: BrowserLabActivity
    purpose: login_navigation_observation_and_request_inspection
  - name: CapabilityScanActivity
    purpose: show_auto_detected_signals_scores_and_classification
  - name: ReplayValidationActivity
    purpose: run_profile_replay_checks_and_show_results
  - name: ProfileExportActivity
    purpose: export_site_profile_and_session_safe_artifacts

codex_adb_workflow:
  purpose: accelerate_deterministic_development_by_combining_adb_control_and_structured_logs
  loop:
    - open_activity
    - perform_defined_click_sequence
    - capture_logcat
    - segment_events_by_semantic_markers
    - generate_candidate_report
    - replay_or_retry_with_changes
  app_controls_required:
    - mark_login_start
    - mark_login_success
    - mark_home_loaded
    - mark_search_start
    - mark_search_result
    - mark_playback_start
    - export_session_snapshot

fishit_player_integration_contract:
  policy:
    - external_catalog_is_logically_separate_from_internal_catalog
    - ui_unifies_results_not_storage_domains
    - import_profiles_before_runtime_provider_logic
  runtime_expectations:
    - provider_scoped_home_sections
    - unified_search_result_model
    - provider_specific_playback_resolver
    - session_status_and_reauth_signal
  future_imports:
    - SiteProfile_parser
    - runtime_adapter_contract
    - optional_external_provider_module

phases:
  - phase: 1
    name: browser_near_mapping_lab
    goals:
      - embedded_browser_works
      - request_inspection_works
      - structured_logging_works
      - session_snapshot_export_works
  - phase: 2
    name: candidate_detection_and_classification
    goals:
      - endpoint_candidate_scoring
      - capability_classification
      - profile_draft_generation
  - phase: 3
    name: replay_and_validation
    goals:
      - deterministic_replay
      - session_restore_validation
      - playback_resolution_validation
  - phase: 4
    name: external_catalog_bridge
    goals:
      - mirrored_home_sections
      - unified_search_results
      - provider_scoped_playback
  - phase: 5
    name: fishit_player_import_path
    goals:
      - profile_import_contract
      - minimal_runtime_adapter
      - reauth_and_status_signals

quality_gates:
  must_pass:
    - browser_lab_can_complete_login_for_target_site
    - structured_logs_are_emitted_for_all_major_actions
    - session_restore_works_or_failure_is_classified
    - home_and_search_candidates_are_scored_and_reported
    - profile_export_is_machine_readable_and_reimportable
    - replay_report_is_generated_for_each_profile

external_tools:
  strongly_recommended:
    - mitmproxy
    - Playwright
  future_quality_and_debug_extensions:
    - Chrome_DevTools_for_WebView_debugging
    - Cronet_for_runtime_network_performance_validation
    - SonarQube_or_Detekt_for_static_quality_checks

implementation_notes:
  - Prefer androidx.webkit over raw framework-only usage where practical.
  - Prefer secure secret persistence with Android Keystore-backed encryption.
  - Keep Kotlin runtime modules small and move heuristic-heavy analysis into Python first.
  - Treat mitmproxy and Playwright as validation companions, not app-runtime dependencies.
  - Promote sites to NATIVE_READY only after replay proves stability.
  - Keep external provider data provider-scoped; do not silently merge everything into the main catalog.

machine_readable_outputs:
  required:
    - site_profile_yaml_or_json
    - capability_scan_report_json
    - replay_report_json
    - session_metadata_json
    - structured_log_stream_jsonl

acceptance_definition:
  v1_done_when:
    - Mapper_can_open_a_target_site_in_embedded_browser
    - Mapper_can_capture_and_persist_required_session_primitives
    - Mapper_can_identify_at_least_draft_home_and_search_endpoint_candidates
    - Mapper_can_classify_the_site_capability
    - Mapper_can_export_a_machine_readable_SiteProfile
    - Mapper_can_replay_at_least_one_deterministic_flow_from_the_exported_profile
    - Output_is_ready_to_be_consumed_later_by_FishIT_Player
