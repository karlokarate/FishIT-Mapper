ssot:
  id: mapper-mission-system
  version: 1
  status: draft-binding
  date: 2026-04-02
  owner: Chris
  purpose: >-
    Define the mission-driven operating model for FishIT-Mapper.
    The Mapper must start from an explicit mission selection layer instead of
    dropping directly into the browser. Each mission configures capture,
    probes, extraction, replay minimization, adapter derivation, and export
    bundle composition. The browser remains the main working tool, but it is
    no longer the product entrypoint.

design_principles:
  - mission_first_browser_second
  - site_runtime_model_is_always_primary_truth
  - same_core_collector_different_policies
  - capture_and_export_are_separate_stages
  - consumer_specific_outputs_are_derived_adapters
  - explicit_probe_markers_over_implicit_guessing
  - deterministic_export_finalization
  - multifunctional_mapper_single_runtime_core
  - capability_first_not_consumer_first
  - no_fishit_lock_in_at_core_layer

product_goal:
  summary: >-
    FishIT-Mapper must support multiple user goals from one APK:
    building FishIT-compatible provider drafts, generating selective
    website-to-app runtime bundles, mapping APIs/endpoints/auth flows,
    and producing replay/debug fixtures. The mission system must ensure
    that the same browser-near runtime engine is reused while output is
    purpose-fitted to the selected goal.
  explicit_non_goal: >-
    The app must not open directly into a generic browser-only mode as the sole primary UX.
    Browser capture remains central, but mission selection must define the run.

runtime_flow:
  canonical_pipeline:
    - mission_selection
    - mission_profile_activation
    - wizard_setup
    - browser_lab_execution
    - wizard_step_execution
    - probe_marker_capture
    - runtime_capture
    - wizard_saturation_evaluation
    - normalized_runtime_export
    - site_runtime_model_generation
    - adapter_derivation
    - export_bundle_finalization
  rules:
    - mission_selection_must_complete_before_browser_open
    - wizard_steps_must_drive_required_probe_execution
    - site_runtime_model_must_exist_for_every_completed_mission
    - adapters_must_only_be_derived_after_core_model_generation
    - no_consumer_specific_export_may_bypass_core_model
    - export_bundle_must_be_finalized_atomically

mission_system:
  required_components:
    - MissionProfile
    - MissionPresetRegistry
    - MissionExecutionState
    - MissionEntryScreen
    - MissionWizardController
    - WizardStepDefinition
    - WizardSaturationEngine
    - BrowserOverlayAnchorModel
    - ProbeChecklist
    - CapturePolicy
    - BodyCapturePolicy
    - ExtractionPolicy
    - ReplayPolicy
    - AdapterDerivationPolicy
    - ExportPolicy
    - ExportBundleBuilder

mission_profile:
  required_fields:
    - missionId
    - missionKind
    - displayName
    - description
    - outputTargets
    - requiredProbeSet
    - optionalProbeSet
    - capturePolicyRef
    - bodyCapturePolicyRef
    - extractionPolicyRef
    - replayPolicyRef
    - adapterDerivationPolicyRef
    - exportPolicyRef
    - checklistPolicy
    - wizardFlowRef
    - stepSaturationPolicy
    - requiredEvidenceMatrix
    - browserEntryUrlPolicy
    - successCriteria
    - warningPolicy
  missionKind:
    allowed:
      - FISHIT_PIPELINE
      - STANDALONE_APP
      - API_MAPPING
      - REPLAY_BUNDLE
      - CUSTOM
  outputTargets_allowed:
    - site_runtime_model
    - fishit_provider_draft
    - source_pipeline_bundle
    - source_plugin_bundle
    - webapp_runtime_draft
    - replay_bundle
    - endpoint_templates
    - field_matrix
    - auth_draft
    - playback_draft
    - confidence_report
    - warnings
    - fixture_bundle
  semantics:
    - mission_profile_must_be_fully_resolved_before_browser_lab_opens
    - mission_profile_must_define_guided_wizard_step_sequence
    - mission_profile_must_define_minimum_probe_expectations
    - mission_profile_must_drive_export_composition
    - mission_profile_must_not_change_core_capture_shape_only_policies

mission_preset_registry:
  required_fields:
    - registryVersion
    - presets
  preset_required_fields:
    - missionId
    - isBuiltIn
    - displayOrder
    - enabledByDefault
    - profile
  semantics:
    - built_in_presets_must_be_shipped_in_app
    - custom_presets_may_extend_but_not_break_contracts
    - preset_registry_must_be_versioned

mission_execution_state:
  required_fields:
    - activeMissionId
    - state
    - startedAt
    - activeWizardStep
    - wizardStepStates
    - saturationState
    - activeProbe
    - completedProbes
    - pendingRequiredProbes
    - exportReadiness
    - warnings
  state:
    allowed:
      - IDLE
      - MISSION_SELECTED
      - BROWSER_LAB_ACTIVE
      - CAPTURE_RUNNING
      - CAPTURE_PAUSED
      - CAPTURE_FINISHED
      - MODEL_BUILDING
      - EXPORT_READY
      - EXPORTING
      - FAILED
  exportReadiness:
    allowed:
      - NOT_READY
      - PARTIAL
      - READY
      - BLOCKED
  saturationState:
    allowed:
      - INCOMPLETE
      - NEEDS_MORE_EVIDENCE
      - SATURATED
      - BLOCKED
  semantics:
    - execution_state_must_be_persistable_for_recovery
    - active_wizard_step_must_reflect_current_guided_task
    - export_readiness_must_reflect_probe_checklist_and_core_model_status

wizard_step_model:
  step_required_fields:
    - stepId
    - missionScope
    - stepType
    - optionality
    - requiredEvidence
    - saturationPolicy
    - completionRules
    - browserInstruction
  stepType_allowed:
    - target_url_input
    - home_probe_step
    - search_probe_step
    - detail_probe_step
    - playback_probe_step
    - auth_probe_step_optional
    - final_validation_export
  optionality_allowed:
    - required
    - optional
  saturation_state_allowed:
    - INCOMPLETE
    - NEEDS_MORE_EVIDENCE
    - SATURATED
    - BLOCKED
  semantics:
    - wizard_is_guided_manual_user_executes_actions_in_einkbro_context
    - wizard_must_emit_step_state_changes_as_machine_readable_events
    - saturation_evaluation_must_use_runtime_evidence_not_user_guess

wizard_flow_templates:
  shared_entry_sequence:
    - mission_selection
    - target_url_input
    - home_probe_step
  by_mission:
    FISHIT_PIPELINE:
      required_steps:
        - target_url_input
        - home_probe_step
        - search_probe_step
        - detail_probe_step
        - playback_probe_step
        - final_validation_export
      optional_steps:
        - auth_probe_step_optional
    STANDALONE_APP:
      required_steps:
        - target_url_input
        - home_probe_step
        - detail_probe_step
        - final_validation_export
      optional_steps:
        - search_probe_step
        - playback_probe_step
        - auth_probe_step_optional
    API_MAPPING:
      required_steps:
        - target_url_input
        - home_probe_step
        - search_probe_step
        - detail_probe_step
        - final_validation_export
      optional_steps:
        - playback_probe_step
        - auth_probe_step_optional
    REPLAY_BUNDLE:
      required_steps:
        - target_url_input
        - home_probe_step
        - final_validation_export
      optional_steps:
        - search_probe_step
        - detail_probe_step
        - playback_probe_step
        - auth_probe_step_optional

browser_overlay_anchor_model:
  required_fields:
    - anchorId
    - name
    - type
    - createdAt
    - browserContextRef
    - correlationRefs
  semantics:
    - overlay_anchors_must_be_creatable_during_wizard_steps
    - anchors_must_link_to_runtime_events_for_traceability
    - anchor_names_must_be_user_defined_and_editable

probe_model:
  probe_types:
    - home_probe
    - search_probe
    - detail_probe
    - playback_probe
    - auth_probe
    - replay_probe
    - background_noise
  rules:
    - every_runtime_event_must_resolve_to_exactly_one_final_phase
    - mission_profiles_define_required_and_optional_probe_sets
    - probe_markers_must_be_explicit_where_possible
    - implicit_resolution_is_allowed_only_as_fallback

probe_checklist:
  required_fields:
    - missionId
    - requiredProbes
    - optionalProbes
    - completedProbes
    - missingRequiredProbes
    - readinessScore
    - recommendations
  semantics:
    - checklist_must_be_visible_in_ui_during_run
    - checklist_must_update_live_as_probe_evidence_arrives
    - export_should_warn_when_required_probes_are_missing

capture_policy:
  required_fields:
    - collectRequestMetadata
    - collectResponseMetadata
    - collectCookies
    - collectStorageArtifacts
    - collectProvenance
    - collectNavigationSignals
    - collectUiMarkers
    - collectPlaybackSignals
    - collectAuthSignals
    - noiseHandlingMode
  noiseHandlingMode:
    allowed:
      - exclude_from_scoring
      - collect_but_flag
      - minimal_capture_only
  semantics:
    - capture_policy_controls_scope_not_core_format
    - raw_events_must_remain_machine_readable_and_append_only

body_capture_policy:
  required_fields:
    - fullRequiredKinds
    - truncatableKinds
    - metadataOnlyKinds
    - skipKinds
    - maxBodyBytesByKind
    - dedupeLargeBodies
    - explicitTruncationRequired
  fullRequiredKinds_examples:
    - graphql_json
    - rest_json_candidate
    - manifest
    - resolver_payload
    - candidate_html_document
  truncatableKinds_examples:
    - non_candidate_large_html
    - binary_asset
  metadataOnlyKinds_examples:
    - playback_media_segment
    - generic_media_chunk
    - browser_noise_binary
  skipKinds_examples:
    - ad_noise
    - irrelevant_noise
  semantics:
    - mission_profile_may_tighten_body_capture_policy
    - candidate_bodies_must_not_be_silently_truncated
    - truncation_must_be_explicit_and_machine_readable

extraction_policy:
  required_fields:
    - requiredFields
    - optionalFields
    - extractionDepth
    - generateFieldMatrix
    - requireConfidence
    - extractionEventsRequired
  extractionDepth:
    allowed:
      - minimal
      - standard
      - deep
  requiredFields_examples:
    - title
    - image
    - canonicalId
    - playbackHint
  semantics:
    - mission_profile_must_define_field_expectations
    - extraction_output_must_be_visible_not_implicit

replay_policy:
  required_fields:
    - enabled
    - minimizationMode
    - validateHome
    - validateSearch
    - validateDetail
    - validatePlayback
    - validateAuth
    - browserAssistedAllowed
    - nativeReplayPreferred
  minimizationMode:
    allowed:
      - none
      - standard
      - aggressive
  semantics:
    - replay_policy_controls_requirement_minimization_and_validation
    - fishit_pipeline_and_api_mapping_should_enable_replay_minimization
    - replay_bundle_mission_must_preserve_fixture_replay_outputs

adapter_derivation_policy:
  required_fields:
    - deriveFishitProvider
    - deriveWebappRuntime
    - deriveReplayBundle
    - deriveEndpointTemplates
    - deriveFieldMatrix
    - deriveAuthDraft
    - derivePlaybackDraft
    - requireCoreModelConfidenceThreshold
  semantics:
    - adapters_must_be_derived_only_from_site_runtime_model
    - mission_profile_selects_which_adapters_are_emitted
    - unsupported_adapters_must_not_be_emitted_as_empty_shells

export_policy:
  required_fields:
    - bundleFormat
    - includeRawEvents
    - includeResponseStoreIndex
    - includeFixtureArtifacts
    - deterministicSerialization
    - includeWarnings
    - includeConfidenceReport
    - exportOnlyMissionRelevantAdapters
  bundleFormat:
    allowed:
      - directory
      - zip
      - signed_bundle
  semantics:
    - export_policy_controls_bundle_contents_not_core_model_shape
    - mission_irrelevant_outputs_should_be_excluded_by_default
    - deterministic_serialization_is_mandatory

built_in_mission_presets:
  FISHIT_PIPELINE:
    displayName: FishIT Pipeline
    description: >-
      Build a FishIT-compatible provider draft with replay-minimized endpoint
      requirements for home, search, detail, playback, and auth when present.
    outputTargets:
      - site_runtime_model
      - fishit_provider_draft
      - source_pipeline_bundle
      - source_plugin_bundle
      - endpoint_templates
      - field_matrix
      - auth_draft
      - playback_draft
      - confidence_report
      - warnings
    requiredProbeSet:
      - home_probe
      - search_probe
      - detail_probe
      - playback_probe
    optionalProbeSet:
      - auth_probe
      - replay_probe
    wizardFlowRef: flow_fishit_pipeline_guided_manual
    stepSaturationPolicy:
      mode: guided_manual
      allowRepeatUntilSaturated: true
      blockOnMissingRequiredEvidence: true
    requiredEvidenceMatrix:
      target_url_input:
        requiredSignals:
          - target_site_id_correlated
      home_probe_step:
        requiredSignals:
          - home_candidate_count_min
      search_probe_step:
        requiredSignals:
          - search_candidate_count_min
          - field_matrix_search_mapping_present
      detail_probe_step:
        requiredSignals:
          - detail_candidate_count_min
          - field_matrix_detail_mapping_present
      playback_probe_step:
        requiredSignals:
          - playback_resolver_or_manifest_present
      final_validation_export:
        requiredSignals:
          - mission_relevant_export_artifacts_ready
    capturePolicy:
      collectRequestMetadata: true
      collectResponseMetadata: true
      collectCookies: true
      collectStorageArtifacts: true
      collectProvenance: true
      collectNavigationSignals: true
      collectUiMarkers: true
      collectPlaybackSignals: true
      collectAuthSignals: true
      noiseHandlingMode: exclude_from_scoring
    bodyCapturePolicy:
      fullRequiredKinds:
        - graphql_json
        - rest_json_candidate
        - manifest
        - resolver_payload
        - candidate_html_document
      truncatableKinds:
        - non_candidate_large_html
      metadataOnlyKinds:
        - playback_media_segment
        - generic_media_chunk
      skipKinds:
        - ad_noise
      dedupeLargeBodies: true
      explicitTruncationRequired: true
    extractionPolicy:
      requiredFields:
        - title
        - image
        - canonicalId
        - playbackHint
        - sectionName
      optionalFields:
        - subtitle
        - description
        - collectionId
      extractionDepth: standard
      generateFieldMatrix: true
      requireConfidence: true
      extractionEventsRequired: true
    replayPolicy:
      enabled: true
      minimizationMode: standard
      validateHome: true
      validateSearch: true
      validateDetail: true
      validatePlayback: true
      validateAuth: true
      browserAssistedAllowed: true
      nativeReplayPreferred: true
    adapterDerivationPolicy:
      deriveFishitProvider: true
      deriveWebappRuntime: false
      deriveReplayBundle: false
      deriveEndpointTemplates: true
      deriveFieldMatrix: true
      deriveAuthDraft: true
      derivePlaybackDraft: true
      requireCoreModelConfidenceThreshold: 0.70
    exportPolicy:
      bundleFormat: zip
      includeRawEvents: false
      includeResponseStoreIndex: true
      includeFixtureArtifacts: false
      deterministicSerialization: true
      includeWarnings: true
      includeConfidenceReport: true
      exportOnlyMissionRelevantAdapters: true

  STANDALONE_APP:
    displayName: Selective App Builder
    description: >-
      Build a selective website-to-app runtime bundle with navigation,
      session bootstrap, playback policy, and optional selective native data endpoints.
    outputTargets:
      - site_runtime_model
      - webapp_runtime_draft
      - endpoint_templates
      - field_matrix
      - playback_draft
      - confidence_report
      - warnings
    requiredProbeSet:
      - home_probe
      - detail_probe
    optionalProbeSet:
      - search_probe
      - playback_probe
      - auth_probe
    wizardFlowRef: flow_standalone_app_guided_manual
    stepSaturationPolicy:
      mode: guided_manual
      allowRepeatUntilSaturated: true
      blockOnMissingRequiredEvidence: true
    requiredEvidenceMatrix:
      target_url_input:
        requiredSignals:
          - target_site_id_correlated
      home_probe_step:
        requiredSignals:
          - home_candidate_count_min
      detail_probe_step:
        requiredSignals:
          - detail_candidate_count_min
      final_validation_export:
        requiredSignals:
          - mission_relevant_export_artifacts_ready
    capturePolicy:
      collectRequestMetadata: true
      collectResponseMetadata: true
      collectCookies: true
      collectStorageArtifacts: true
      collectProvenance: true
      collectNavigationSignals: true
      collectUiMarkers: true
      collectPlaybackSignals: true
      collectAuthSignals: true
      noiseHandlingMode: collect_but_flag
    bodyCapturePolicy:
      fullRequiredKinds:
        - graphql_json
        - rest_json_candidate
        - manifest
        - candidate_html_document
        - resolver_payload
      truncatableKinds:
        - non_candidate_large_html
      metadataOnlyKinds:
        - playback_media_segment
      skipKinds:
        - ad_noise
      dedupeLargeBodies: true
      explicitTruncationRequired: true
    extractionPolicy:
      requiredFields:
        - title
        - image
        - canonicalId
        - detailMapping
        - searchMapping
      optionalFields:
        - description
        - sectionName
        - playbackHint
      extractionDepth: deep
      generateFieldMatrix: true
      requireConfidence: true
      extractionEventsRequired: true
    replayPolicy:
      enabled: true
      minimizationMode: standard
      validateHome: true
      validateSearch: true
      validateDetail: true
      validatePlayback: true
      validateAuth: true
      browserAssistedAllowed: true
      nativeReplayPreferred: false
    adapterDerivationPolicy:
      deriveFishitProvider: false
      deriveWebappRuntime: true
      deriveReplayBundle: false
      deriveEndpointTemplates: true
      deriveFieldMatrix: true
      deriveAuthDraft: false
      derivePlaybackDraft: true
      requireCoreModelConfidenceThreshold: 0.65
    exportPolicy:
      bundleFormat: zip
      includeRawEvents: false
      includeResponseStoreIndex: true
      includeFixtureArtifacts: false
      deterministicSerialization: true
      includeWarnings: true
      includeConfidenceReport: true
      exportOnlyMissionRelevantAdapters: true

  API_MAPPING:
    displayName: API / Endpoint Mapping
    description: >-
      Build a technical endpoint/auth/provenance/replay export with minimal consumer UI assumptions.
    outputTargets:
      - site_runtime_model
      - endpoint_templates
      - replay_bundle
      - confidence_report
      - warnings
    requiredProbeSet:
      - home_probe
      - search_probe
      - detail_probe
    optionalProbeSet:
      - playback_probe
      - auth_probe
      - replay_probe
    wizardFlowRef: flow_api_mapping_guided_manual
    stepSaturationPolicy:
      mode: guided_manual
      allowRepeatUntilSaturated: true
      blockOnMissingRequiredEvidence: true
    requiredEvidenceMatrix:
      target_url_input:
        requiredSignals:
          - target_site_id_correlated
      search_probe_step:
        requiredSignals:
          - search_candidate_count_min
      detail_probe_step:
        requiredSignals:
          - detail_candidate_count_min
      final_validation_export:
        requiredSignals:
          - mission_relevant_export_artifacts_ready
    capturePolicy:
      collectRequestMetadata: true
      collectResponseMetadata: true
      collectCookies: true
      collectStorageArtifacts: true
      collectProvenance: true
      collectNavigationSignals: false
      collectUiMarkers: true
      collectPlaybackSignals: true
      collectAuthSignals: true
      noiseHandlingMode: exclude_from_scoring
    bodyCapturePolicy:
      fullRequiredKinds:
        - graphql_json
        - rest_json_candidate
        - resolver_payload
        - manifest
      truncatableKinds:
        - candidate_html_document
        - non_candidate_large_html
      metadataOnlyKinds:
        - playback_media_segment
      skipKinds:
        - ad_noise
      dedupeLargeBodies: true
      explicitTruncationRequired: true
    extractionPolicy:
      requiredFields:
        - canonicalId
        - playbackHint
      optionalFields:
        - title
        - image
      extractionDepth: minimal
      generateFieldMatrix: true
      requireConfidence: true
      extractionEventsRequired: true
    replayPolicy:
      enabled: true
      minimizationMode: aggressive
      validateHome: true
      validateSearch: true
      validateDetail: true
      validatePlayback: true
      validateAuth: true
      browserAssistedAllowed: true
      nativeReplayPreferred: true
    adapterDerivationPolicy:
      deriveFishitProvider: false
      deriveWebappRuntime: false
      deriveReplayBundle: true
      deriveEndpointTemplates: true
      deriveFieldMatrix: true
      deriveAuthDraft: true
      derivePlaybackDraft: true
      requireCoreModelConfidenceThreshold: 0.60
    exportPolicy:
      bundleFormat: zip
      includeRawEvents: true
      includeResponseStoreIndex: true
      includeFixtureArtifacts: true
      deterministicSerialization: true
      includeWarnings: true
      includeConfidenceReport: true
      exportOnlyMissionRelevantAdapters: true

  REPLAY_BUNDLE:
    displayName: Replay / Debug Bundle
    description: >-
      Produce a fixture-ready replay bundle with raw events, response indexes,
      provenance, and expected outcomes for deterministic offline replay.
    outputTargets:
      - site_runtime_model
      - replay_bundle
      - confidence_report
      - warnings
      - fixture_bundle
    requiredProbeSet:
      - home_probe
    optionalProbeSet:
      - search_probe
      - detail_probe
      - playback_probe
      - auth_probe
      - replay_probe
    wizardFlowRef: flow_replay_bundle_guided_manual
    stepSaturationPolicy:
      mode: guided_manual
      allowRepeatUntilSaturated: true
      blockOnMissingRequiredEvidence: true
    requiredEvidenceMatrix:
      target_url_input:
        requiredSignals:
          - target_site_id_correlated
      home_probe_step:
        requiredSignals:
          - home_candidate_count_min
      final_validation_export:
        requiredSignals:
          - mission_relevant_export_artifacts_ready
    capturePolicy:
      collectRequestMetadata: true
      collectResponseMetadata: true
      collectCookies: true
      collectStorageArtifacts: true
      collectProvenance: true
      collectNavigationSignals: true
      collectUiMarkers: true
      collectPlaybackSignals: true
      collectAuthSignals: true
      noiseHandlingMode: collect_but_flag
    bodyCapturePolicy:
      fullRequiredKinds:
