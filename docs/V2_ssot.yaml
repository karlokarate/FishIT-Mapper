persistence:
  session_store:
    stores:
      - cookies
      - selected_local_storage_keys
      - selected_indexeddb_references_or_exports_when_needed
      - token_metadata
      - last_successful_session_validation
    avoid:
      - blind_full_storage_dumps_when_not_required
      - storing_values_without_provenance
  provenance_required_for_all_session_primitives:
    examples:
      - COOKIE(sessionid)
      - LOCAL_STORAGE(auth.accessToken)
      - INDEXED_DB(site.auth.db.key)
      - HTML_META(csrf-token)
      - RESPONSE_JSON(refresh.access_token)
  security_requirements:
    - use_android_keystore_backed_encryption_for_secrets
    - prefer_custom_small_secure_wrapper_over_adding_new_deprecated_security_layers
